# ==========================================================
# Application
# ==========================================================

spring.application.name=server-inventory

# ==========================================================
# PostgreSQL Database (AWS RDS)
# ==========================================================

spring.datasource.url=jdbc:postgresql://database-instance.c5cmascsgtnk.ap-south-1.rds.amazonaws.com:5432/server_inventory
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================================
# JPA / Hibernate
# ==========================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# Server
# ==========================================================

server.port=8080
server.servlet.context-path=/server-inventory

# ==========================================================
# Logging
# ==========================================================

logging.level.root=INFO
logging.level.com.serverinventory=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

logging.file.name=logs/server-inventory.log

# ==========================================================
# Jackson
# ==========================================================

spring.jackson.serialization.indent-output=true

# ==========================================================
# Spring Boot Actuator
# ==========================================================

management.server.port=8080

management.endpoints.web.base-path=/actuator

management.endpoints.web.exposure.include=health,prometheus

management.endpoint.health.enabled=true

management.endpoint.prometheus.enabled=true

management.endpoint.health.show-details=never

management.health.defaults.enabled=true

# ==========================================================
# Prometheus Metrics
# ==========================================================

management.prometheus.metrics.export.enabled=true

management.metrics.tags.application=${spring.application.name}

management.metrics.tags.environment=production
