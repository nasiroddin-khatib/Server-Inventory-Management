# ==========================================================
# Application
# ==========================================================

spring.application.name=server-inventory

# ==========================================================
# PostgreSQL Database
# ==========================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/server_inventory
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================================
# JPA / Hibernate
# ==========================================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# Server
# ==========================================================

server.servlet.context-path=/server-inventory

# ==========================================================
# Logging
# ==========================================================

logging.level.root=INFO

logging.level.com.serverinventory=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

logging.file.name=logs/server-inventory.log

# ==========================================================
# Jackson
# ==========================================================

spring.jackson.serialization.indent-output=true
