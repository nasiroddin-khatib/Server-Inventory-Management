<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Inventory Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="container">
            <h1>🖥️ Server Inventory Manager</h1>
            <p>Manage your infrastructure servers easily</p>
        </div>
    </header>

    <!-- Controls -->
    <section class="controls container">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search Server..."
        >

        <button id="addServerBtn">
            + Add Server
        </button>

    </section>

    <!-- Server Cards -->
    <main class="container">

        <div id="serverContainer" class="server-grid">

            <!-- Sample Card -->

            <div class="server-card">

                <h2>Jenkins Server</h2>

                <div class="info">

                    <p><strong>IP Address:</strong> 10.0.0.10</p>

                    <p><strong>Operating System:</strong> Ubuntu 22.04</p>

                    <p><strong>Environment:</strong> Development</p>

                    <p><strong>Status:</strong>
                        <span class="status running">
                            Running
                        </span>
                    </p>

                    <p><strong>Owner:</strong> DevOps Team</p>

                </div>

                <div class="card-buttons">

                    <button class="edit-btn">
                        Edit
                    </button>

                    <button class="delete-btn">
                        Delete
                    </button>

                </div>

            </div>

        </div>

    </main>

    <!-- Modal -->

    <div id="serverModal" class="modal">

        <div class="modal-content">

            <span id="closeModal" class="close">
                &times;
            </span>

            <h2>Add Server</h2>

            <form id="serverForm">

                <label>Server Name</label>
                <input
                    type="text"
                    id="serverName"
                    required
                >

                <label>IP Address</label>
                <input
                    type="text"
                    id="ipAddress"
                    required
                >

                <label>Operating System</label>
                <input
                    type="text"
                    id="operatingSystem"
                    required
                >

                <label>Environment</label>

                <select id="environment">

                    <option value="Development">Development</option>

                    <option value="Testing">Testing</option>

                    <option value="Staging">Staging</option>

                    <option value="Production">Production</option>

                </select>

                <label>Status</label>

                <select id="status">

                    <option value="Running">Running</option>

                    <option value="Stopped">Stopped</option>

                    <option value="Maintenance">Maintenance</option>

                </select>

                <label>Owner</label>

                <input
                    type="text"
                    id="owner"
                    required
                >

                <button type="submit" class="save-btn">
                    Save Server
                </button>

            </form>

        </div>

    </div>

    <script src="api.js"></script>
    <script src="script.js"></script>

</body>

</html>
